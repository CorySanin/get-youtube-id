name: Unit tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  
jobs:

  npm_test:
    name: Unit tests (${{ matrix.nodever }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        nodever:
          [
            'latest',
            'lts/*',
            'lts/jod'
          ]
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup nodejs
      uses: actions/setup-node@v6
      with:
        node-version: "${{ matrix.nodever }}"
        check-latest: true
        token: ${{ secrets.GH_PAT }}
    
    - name: set up pnpm
      uses: pnpm/action-setup@v6

    - name: Install dependencies
      run: |
        pnpm install && \
        git checkout pnpm-lock.yaml

    - name: Build
      run: pnpm run build
    
    - name: Run tests + coverage
      run: pnpm run coverage
